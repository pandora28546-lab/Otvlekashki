<title>Пазл</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif; background: #EEF2F7;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px; gap: 16px;
}
.puzzle-card {
  background: white; border-radius: 20px;
  border: 2.5px solid #D8E4EE;
  width: 500px; height: 240px;
  position: relative; overflow: hidden;
  touch-action: none; user-select: none;
}
/* Правая картинка: left:50% — левый край = 250px от левого края карточки */
#imgRight {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translateY(-50%);
  height: 200px;
  width: auto;
  pointer-events: none;
}
/* Левая картинка */
#imgLeft {
  position: absolute;
  top: 50%;
  height: 200px;
  width: auto;
  transform: translateY(-50%);
  cursor: grab;
}
.hint { color: #F5871F; font-weight: 700; font-size:14px; text-align:center; }
button { background:#6FA0C8; color:white; border:none; border-radius:50px; padding:10px 24px; font-size:15px; font-weight:700; cursor:pointer; }
#debug { font-size:12px; color:#888; font-family:monospace; }
</style>

</div>
<div class="hint" id="hint">Загрузка...</div>
<button onclick="reset()">🔄 Сначала</button>
<div id="debug"></div>

<script>
const card    = document.getElementById('card');
const iL      = document.getElementById('imgLeft');
const iR      = document.getElementById('imgRight');
const hint    = document.getElementById('hint');
const dbg     = document.getElementById('debug');

// Ключевая идея: snapLeft = 250 - leftImgWidth
// 250 = половина карточки (500px / 2) — левый край правой картинки
// leftImgWidth = высота 200px * (naturalWidth/naturalHeight)
const CARD_W    = 500;
const CARD_HALF = CARD_W / 2; // = 250, всегда левый край imgRight
const IMG_H     = 200;
const START     = 0;
const GAP       = 60; // зазор анимации
let snapLeft    = 0;
let hintMax     = 0;

let isDrag=false, dragX=0, startL=0;
let joined=false, animId=null;

iL.onload = () => {
  // naturalWidth/naturalHeight известны точно после onload
  const leftW = iL.offsetWidth; // use actual rendered px width to avoid float precision overlap
  snapLeft = CARD_HALF - leftW;
  hintMax  = snapLeft - GAP;
  dbg.textContent = `leftW=${leftW.toFixed(1)} snapLeft=${snapLeft.toFixed(1)} cardHalf=${CARD_HALF}`;
  iL.style.left = START + 'px';
  hint.textContent = 'Тяни левую картинку вправо!';
  startAnim();
};

function eio(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
function eiq(t){ return t*t; }

function startAnim(){
  stopAnim();
  const travel = hintMax - START;
  let p=0, going=true, pause=0;
  function step(ts){
    if(isDrag||joined) return;
    if(pause && ts<pause){ animId=requestAnimationFrame(step); return; }
    pause=0;
    if(going){ p+=0.008; if(p>=1){ p=1; going=false; pause=ts+500; } }
    else      { p-=0.04;  if(p<=0){ p=0; going=true; } }
    iL.style.left = (START + (going||p>0 ? eio(p) : eiq(p))*travel) + 'px';
    animId=requestAnimationFrame(step);
  }
  animId=requestAnimationFrame(step);
}
function stopAnim(){ if(animId){ cancelAnimationFrame(animId); animId=null; } }

function animTo(from,to,dur,cb){
  stopAnim();
  const t0=performance.now();
  function step(ts){
    const t=Math.min(1,(ts-t0)/dur);
    iL.style.left=(from+(to-from)*eio(t))+'px';
    if(t<1) animId=requestAnimationFrame(step);
    else { animId=null; if(cb) cb(); }
  }
  animId=requestAnimationFrame(step);
}

iL.addEventListener('touchstart',e=>{e.preventDefault();go(e.touches[0].clientX);},{passive:false});
document.addEventListener('touchmove',e=>{if(isDrag){e.preventDefault();mv(e.touches[0].clientX);}},{passive:false});
document.addEventListener('touchend',()=>up());
iL.addEventListener('mousedown',e=>go(e.clientX));
document.addEventListener('mousemove',e=>mv(e.clientX));
document.addEventListener('mouseup',()=>up());

function go(x){
  if(joined) return;
  stopAnim(); isDrag=true; dragX=x;
  startL=parseFloat(iL.style.left)||START;
  iL.style.cursor='grabbing';
}
function mv(x){
  if(!isDrag) return;
  const nl = Math.max(START, Math.min(snapLeft, startL+(x-dragX)));
  iL.style.left=nl+'px';
  dbg.textContent=`left=${nl.toFixed(1)} snapLeft=${snapLeft.toFixed(1)} diff=${(snapLeft-nl).toFixed(1)}`;
  hint.textContent=(snapLeft-nl)<5?'Отпускай!':'Тяни вправо!';
}
function up(){
  if(!isDrag) return;
  isDrag=false; iL.style.cursor='grab';
  const cur=parseFloat(iL.style.left);
  if(cur>=snapLeft-5){
    iL.style.left=snapLeft+'px';
    joined=true; hint.textContent='🎉 Отлично!';
  } else {
    animTo(cur,START,300,()=>{ hint.textContent='Тяни вправо!'; startAnim(); });
  }
}

function reset(){
  stopAnim(); joined=false;
  iL.style.left=START+'px';
  hint.textContent='Тяни вправо!';
  setTimeout(startAnim,50);
}
</script>
