<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Игра «Большой и маленький»</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

#sofia-game {
  font-family: 'Nunito', Arial, sans-serif;
  background: #EEF2F7;
  color: #2C3E52;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 16px;
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  box-sizing: border-box;
  box-shadow: 0 16px 60px rgba(0,0,0,.25), 0 4px 16px rgba(0,0,0,.15);
  min-height: 480px;
}
#sofia-game *, #sofia-game *::before, #sofia-game *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}

#sg-loading {
  position: absolute;
  inset: 0;
  background: #EEF2F7;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 150; border-radius: 24px;
}
#sg-loading .sg-load-text { font-size: 22px; font-weight: 800; color: #555; text-align: center; padding: 0 20px; }
#sg-loading .sg-load-bar-wrap { width: 260px; height: 8px; background: #bbb; border-radius: 99px; overflow: hidden; }
#sg-loading .sg-load-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#6FA0C8,#A8CCE8); border-radius: 99px; transition: width .3s; }

#sg-wrap { display: block; }

#sofia-game .sg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
#sofia-game .sg-stage-label { font-size: 13px; font-weight: 700; color: #888; letter-spacing: .04em; text-transform: uppercase; }
#sofia-game .sg-stage-dots { display: flex; gap: 8px; margin-top: 4px; }
#sofia-game .sg-dot { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #bbb; transition: all .3s; }
#sofia-game .sg-dot.sg-active { background: #F5871F; border-color: #F5871F; color: white; transform: scale(1.15); }
#sofia-game .sg-dot.sg-done   { background: #6FA0C8; border-color: #6FA0C8; color: white; }

#sofia-game .sg-sound-btn { width: 44px; height: 44px; border-radius: 50%; background: #6FA0C8; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,.15); transition: transform .15s, background .2s; flex-shrink: 0; }
#sofia-game .sg-sound-btn:hover { transform: scale(1.1); }
#sofia-game .sg-sound-btn.sg-muted { background: #bbb; }
#sofia-game .sg-sound-btn svg { width: 22px; height: 22px; fill: white; }

#sofia-game .sg-question-box { background: white; border-radius: 20px; padding: 16px 22px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.1); display: flex; align-items: center; gap: 14px; min-height: 68px; }
#sofia-game .sg-question-text { font-size: clamp(18px,4vw,24px); font-weight: 800; flex: 1; }
#sofia-game .sg-repeat-btn { background: none; border: 2px solid #6FA0C8; color: #6FA0C8; border-radius: 50px; padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .2s; }
#sofia-game .sg-repeat-btn:hover { background: #6FA0C8; color: white; }

#sofia-game .sg-progress-wrap { height: 8px; background: rgba(0,0,0,.15); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
#sofia-game .sg-progress-fill { height: 100%; background: linear-gradient(90deg,#6FA0C8,#A8CCE8); border-radius: 99px; transition: width .5s ease; }

#sofia-game .sg-cards { display: flex; gap: 16px; justify-content: center; margin-bottom: 18px; }
#sofia-game .sg-card { flex: 1; max-width: 360px; min-height: 230px; background: white; border-radius: 20px; border: 2.5px solid #D8E4EE; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; padding: 20px; }
#sofia-game .sg-card:hover:not(.sg-disabled) { box-shadow: 0 6px 24px rgba(111,160,200,.2); transform: translateY(-3px); }
#sofia-game .sg-card.sg-disabled { cursor: default; pointer-events: none; }
#sofia-game .sg-card img { max-width: 100%; max-height: 190px; object-fit: contain; display: block; user-select: none; pointer-events: none; }
#sofia-game .sg-card-icon { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: white; z-index: 3; }

#sofia-game .sg-distr-wrap { display: none; justify-content: center; margin-bottom: 18px; }
#sofia-game .sg-distr-card { width: 260px; min-height: 230px; background: white; border-radius: 20px; border: 2.5px solid #D8E4EE; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; cursor: pointer; transition: transform .2s, box-shadow .2s; -webkit-tap-highlight-color: transparent; user-select: none; }
#sofia-game .sg-distr-card.sg-puzzle { width: 100%; max-width: 500px; cursor: default; padding: 0; }
#sofia-game .sg-distr-card:hover:not(.sg-disabled) { box-shadow: 0 6px 24px rgba(111,160,200,.25); transform: translateY(-3px); }
#sofia-game .sg-distr-card.sg-puzzle:hover { box-shadow: none; transform: none; }
#sofia-game .sg-distr-card:active { background: white; }
#sofia-game .sg-distr-card.sg-disabled { cursor: default; pointer-events: none; }
#sofia-game .sg-distr-card img { max-width: 100%; max-height: 190px; object-fit: contain; display: block; user-select: none; pointer-events: none; }
#sofia-game .sg-distr-card.sg-puzzle img { max-width: none; max-height: none; pointer-events: auto; }
#sofia-game .sg-card-overlay { position: absolute; inset: 0; border-radius: 18px; pointer-events: none; z-index: 2; }

#sofia-game .sg-score-row { display: flex; gap: 10px; justify-content: center; font-size: 14px; font-weight: 700; }
#sofia-game .sg-score-chip { background: rgba(255,255,255,.9); border-radius: 50px; padding: 5px 14px; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.1); color: #555; }
#sofia-game .sg-dot-score { width: 10px; height: 10px; border-radius: 50%; }
#sofia-game .sg-dot-score.sg-green { background: #6FA0C8; }
#sofia-game .sg-dot-score.sg-red   { background: #D95B5B; }
#sofia-game .sg-streak-hint { text-align: center; font-size: 14px; color: #F5871F; font-weight: 700; min-height: 22px; margin-top: 8px; }

#sofia-game .sg-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .4s; border-radius: 24px; }
#sofia-game .sg-overlay.sg-show { opacity: 1; pointer-events: all; }
#sofia-game .sg-overlay-box { background: white; border-radius: 28px; padding: 40px 48px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.2); transform: scale(.8); transition: transform .4s cubic-bezier(.34,1.56,.64,1); }
#sofia-game .sg-overlay.sg-show .sg-overlay-box { transform: scale(1); }
#sofia-game .sg-overlay-emoji { font-size: 60px; margin-bottom: 12px; }
#sofia-game .sg-overlay-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; color: #3a3a3a; }
#sofia-game .sg-overlay-sub   { font-size: 16px; color: #888; margin-bottom: 24px; }
#sofia-game .sg-btn-primary { background: #F5871F; color: white; border: none; border-radius: 50px; padding: 14px 32px; font-family: inherit; font-size: 17px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 16px rgba(245,135,31,.4); transition: transform .15s, box-shadow .2s; }
#sofia-game .sg-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,135,31,.45); }

#sg-fireworks { position: absolute; inset: 0; pointer-events: none; z-index: 99; width: 100%; height: 100%; }

#sg-start-overlay { position: absolute; inset: 0; border-radius: 24px; background: rgba(100,140,180,.38); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 200; }
#sg-start-btn { background: #F5871F; color: white; border: none; border-radius: 50px; padding: 18px 52px; font-family: 'Nunito',sans-serif; font-size: 22px; font-weight: 900; cursor: pointer; animation: sg-start-pulse 1.8s ease-in-out infinite; }

@keyframes sg-start-pulse {
  0%,100%{ transform:scale(1); box-shadow:0 6px 28px rgba(245,135,31,.4); }
  50%    { transform:scale(1.07); box-shadow:0 10px 40px rgba(245,135,31,.65); }
}
@keyframes sg-wiggle {
  0%,100%{ transform: rotate(0deg) scale(1); }
  20%    { transform: rotate(-8deg) scale(1.05); }
  40%    { transform: rotate(8deg) scale(1.05); }
  60%    { transform: rotate(-6deg) scale(1.02); }
  80%    { transform: rotate(6deg) scale(1.02); }
}
@keyframes sg-shake {
  0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-8px); }
  40%    { transform:translateX(8px); }  60%{ transform:translateX(-6px); }
  80%    { transform:translateX(6px); }
}
@media (max-width:540px){
  #sofia-game .sg-cards { flex-direction:column; align-items:center; }
  #sofia-game .sg-card  { max-width:100%; width:100%; min-height:160px; }
  #sofia-game .sg-card img { max-height:130px; }
  #sofia-game .sg-distr-card { width:100%; min-height:160px; }
  #sofia-game .sg-distr-card img { max-height:130px; }
  #sofia-game .sg-overlay-box { padding:28px 20px; }
  #sofia-game { padding:14px 10px; }
}
</style>
</head>
<body style="margin:0;padding:20px;background:#f0f0f0;">

<div id="sofia-game">
  <canvas id="sg-fireworks"></canvas>

  <div id="sg-loading">
    <div class="sg-load-text">Секунду, игра загружается 😉</div>
    <div class="sg-load-bar-wrap"><div class="sg-load-bar-fill" id="sg-loadBar"></div></div>
  </div>

  <div id="sg-start-overlay" style="display:none">
    <button id="sg-start-btn">▶ Начать</button>
  </div>

  <div id="sg-wrap">
    <div class="sg-header">
      <div>
        <div class="sg-stage-label">Этап</div>
        <div class="sg-stage-dots">
          <div class="sg-dot sg-active" id="sg-dot-0">1</div>
          <div class="sg-dot"           id="sg-dot-1">2</div>
          <div class="sg-dot"           id="sg-dot-2">3</div>
        </div>
      </div>
      <button class="sg-sound-btn" id="sg-soundBtn">
        <svg id="sg-soundIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
    </div>

    <div class="sg-question-box">
      <div class="sg-question-text" id="sg-questionText">Выбери большой предмет:</div>
      <button class="sg-repeat-btn" id="sg-repeatBtn">🔊 Повторить</button>
    </div>

    <div class="sg-progress-wrap">
      <div class="sg-progress-fill" id="sg-progressBar" style="width:0%"></div>
    </div>

    <div class="sg-cards" id="sg-cards">
      <div class="sg-card" id="sg-card0">
        <div class="sg-card-overlay" id="sg-ov0"></div>
        <div class="sg-card-icon"    id="sg-icon0"></div>
        <img id="sg-img0" src="" alt="">
      </div>
      <div class="sg-card" id="sg-card1">
        <div class="sg-card-overlay" id="sg-ov1"></div>
        <div class="sg-card-icon"    id="sg-icon1"></div>
        <img id="sg-img1" src="" alt="">
      </div>
    </div>

    <div class="sg-distr-wrap" id="sg-distrWrap">
      <div class="sg-distr-card" id="sg-distrCard">
        <div class="sg-card-overlay" id="sg-distrOv"></div>
        <div class="sg-card-icon"    id="sg-distrIcon"></div>
        <img id="sg-distrImg" src="" alt="">
      </div>
    </div>

    <div class="sg-score-row">
      <div class="sg-score-chip"><div class="sg-dot-score sg-green"></div><span id="sg-scoreCorrect">0</span></div>
      <div class="sg-score-chip"><div class="sg-dot-score sg-red"></div><span id="sg-scoreWrong">0</span></div>
    </div>
    <div class="sg-streak-hint" id="sg-streakHint"></div>
  </div>

  <div class="sg-overlay" id="sg-overlay">
    <div class="sg-overlay-box">
      <div class="sg-overlay-emoji" id="sg-overlayEmoji">🎉</div>
      <div class="sg-overlay-title" id="sg-overlayTitle">Молодец!</div>
      <div class="sg-overlay-sub"   id="sg-overlaySub">Этап пройден!</div>
      <button class="sg-btn-primary" id="sg-overlayBtn">Продолжить →</button>
    </div>
  </div>
</div>

<script>
(function(){

/* ─── ДАННЫЕ ─── */
const BASE  = 'https://raw.githubusercontent.com/pandora28546-lab/sofia-game-image/main/';
const DBASE = 'https://raw.githubusercontent.com/pandora28546-lab/Otvlekashki/main/';

const PRAISE_FILES = ['Rock3.m4a','Rock4.m4a','Rock5.m4a','Rock6.m4a','Rock7.m4a','Rock8.m4a','Rock9.m4a'];

const PAIRS = Array.from({length:23},(_,i)=>({
  big:   BASE+(i+1)+'б.png',
  small: BASE+(i+1)+'м.png'
}));

const DISTRACTORS = [
  // Тип tap_wiggle: картинка подёргивается, нужно нажать
  { type:'tap_wiggle', name:'Apple',      label:'Яблоко'      },
  { type:'tap_wiggle', name:'Banana',     label:'Банан'       },
  { type:'tap_wiggle', name:'Carrot',     label:'Морковка'    },
  { type:'tap_wiggle', name:'Cucumber',   label:'Огурец'      },
  { type:'tap_wiggle', name:'Onion',      label:'Лук'         },
  { type:'tap_wiggle', name:'Orange',     label:'Апельсин'    },
  { type:'tap_wiggle', name:'Pear',       label:'Груша'       },
  { type:'tap_wiggle', name:'Tomato',     label:'Помидор'     },
  { type:'tap_wiggle', name:'Ant',        label:'Муравей'     },
  { type:'tap_wiggle', name:'Boar',       label:'Кабан'       },
  { type:'tap_wiggle', name:'Boots',      label:'Сапоги'      },
  { type:'tap_wiggle', name:'Cap',        label:'Кепка'       },
  { type:'tap_wiggle', name:'Caterpillar',label:'Гусеница'    },
  { type:'tap_wiggle', name:'Dress',      label:'Платье'      },
  { type:'tap_wiggle', name:'Elk',        label:'Лось'        },
  { type:'tap_wiggle', name:'Fox',        label:'Лиса'        },
  { type:'tap_wiggle', name:'Gloves',     label:'Перчатки'    },
  { type:'tap_wiggle', name:'Jacket',     label:'Куртка'      },
  { type:'tap_wiggle', name:'Rabbit',     label:'Кролик'      },
  { type:'tap_wiggle', name:'Snail',      label:'Улитка'      },
  { type:'tap_wiggle', name:'Socks',      label:'Носки'       },
  { type:'tap_wiggle', name:'Spider',     label:'Паук'        },
  { type:'tap_wiggle', name:'Squirrel',   label:'Белка'       },
  { type:'tap_wiggle', name:'Tshirt',     label:'Футболка'    },
  { type:'tap_wiggle', name:'Trousers',   label:'Брюки'       },
  { type:'tap_wiggle', name:'Worm',       label:'Червяк'      },
  // Тип sound_auto: картинка + звук, нажать чтобы переключить
  { type:'sound_auto', name:'Car',     imgName:'Car',     label:'Машина'  },
  { type:'sound_auto', name:'Chicken', imgName:'Chicken', label:'Курица'  },
  { type:'sound_auto', name:'Cow',     imgName:'Cow',     label:'Корова'  },
  { type:'sound_auto', name:'Horse',   imgName:'Hors',    label:'Лошадь'  },
  { type:'sound_auto', name:'Train',   imgName:'Train',   label:'Поезд'   },
  { type:'sound_auto', name:'Goose',   imgName:'Goose',   label:'Гусь'    },
  { type:'sound_auto', name:'Pig',     imgName:'Pig',     label:'Свинья'  },
  { type:'sound_auto', name:'Ship',    imgName:'Ship',    label:'Корабль' },
  // Тип puzzle: соединить две половинки
  { type:'puzzle', name:'1', leftExt:'jpeg', rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'2', leftExt:'jpeg', rightExt:'png',  label:'Собери!' },
  { type:'puzzle', name:'3', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'4', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'5', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'6', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'7', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
  { type:'puzzle', name:'8', leftExt:'png',  rightExt:'jpeg', label:'Собери!' },
];

const ABA_STEPS = 4;

/* ─── PRELOAD ─── */
let loaded = 0, total = PAIRS.length * 2;
const bar = document.getElementById('sg-loadBar');

function tick(){
  loaded++;
  bar.style.width = Math.round(loaded/total*100) + '%';
  if(loaded >= total){
    setTimeout(()=>{
      document.getElementById('sg-loading').style.display = 'none';
      document.getElementById('sg-start-overlay').style.display = 'flex';
    }, 300);
  }
}

PAIRS.forEach(p => ['big','small'].forEach(s => {
  const img = new Image();
  img.onload = img.onerror = tick;
  img.src = p[s];
}));

/* ─── AUDIO ─── */
let soundOn = true;
let currentAudio = null;

function playAudio(filename, onDone){
  if(!soundOn){ if(onDone) setTimeout(onDone, 0); return; }
  if(currentAudio){ currentAudio.pause(); currentAudio = null; }
  const a = new Audio(BASE + filename);
  currentAudio = a;
  let done = false;
  function finish(){ if(!done){ done=true; currentAudio=null; if(onDone) onDone(); } }
  a.onended = finish;
  a.onerror = finish;
  setTimeout(finish, 8000);
  a.play().catch(finish);
}

function playItemAudio(name, onDone){
  if(!soundOn){ if(onDone) setTimeout(onDone,0); return; }
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  const a = new Audio(DBASE + name + '.m4a');
  currentAudio = a;
  let done=false;
  function finish(){ if(!done){ done=true; currentAudio=null; if(onDone) onDone(); } }
  a.onended = finish;
  a.onerror = finish;
  setTimeout(finish, 8000);
  a.play().catch(finish);
}

/* ─── WEB AUDIO УБРАН — все звуки через mp3/wav файлы с GitHub ─── */

function playCorrect()          { playSound('correct.wav'); }
function playWrong()            { playSound('wrong.wav'); }
function playDistractorCorrect(){ playSound('distractor correct.wav'); }
function playStageComplete()    { playSound('stage complete.wav'); }
function playFanfare()          { playSound('fanfare.wav'); }

// Отдельный Audio для эффектов — не мешает currentAudio, тише чем речь
function playSound(filename){
  if(!soundOn) return;
  const a = new Audio(DBASE + encodeURIComponent(filename));
  a.volume = 0.35;
  a.play().catch(()=>{});
}

/* ─── СОСТОЯНИЕ ─── */
let currentStage = 0;
let abaStep      = 0;
let ABA_STEPS_CURRENT = 4; // меняется для этапа 3
let scoreCorrect = 0;
let scoreWrong   = 0;
let answered     = false;
let phase        = 'q';
let targetSize   = 'big';
let correctPos   = 0;
let hintPair     = null;
let usedPairs    = new Set();
let stage3Queue  = []; // очередь для этапа 3 (Random Rotation)

/* ─── DOM ─── */
const $ = id => document.getElementById(id);

/* ─── HELPERS ─── */
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

function pickPair(){
  const avail = PAIRS.map((_,i)=>i).filter(i=>!usedPairs.has(i));
  const pool  = avail.length ? avail : PAIRS.map((_,i)=>i);
  const idx   = pool[Math.floor(Math.random()*pool.length)];
  usedPairs.add(idx);
  return PAIRS[idx];
}

function pickTarget(){
  if(currentStage===0) return 'big';
  if(currentStage===1) return 'small';
  return Math.random()<.5 ? 'big' : 'small';
}

function qFile(size)    { return size==='big' ? 'Rock.m4a'  : 'Rock2.m4a';  }
function hintFile(size) { return size==='big' ? 'Rock10.m4a': 'Rock11.m4a'; }
function randPraise(){ return PRAISE_FILES[Math.floor(Math.random()*PRAISE_FILES.length)]; }

/* ─── КАРТОЧКИ ─── */
function setImgs(pair, target, pos){
  const other = target==='big' ? 'small' : 'big';
  $('sg-img0').src = pos===0 ? pair[target] : pair[other];
  $('sg-img1').src = pos===1 ? pair[target] : pair[other];
}

function cardReset(i){
  const c = $('sg-card'+i);
  c.style.border = '2.5px solid #D8E4EE';
  c.style.animation = '';
  c.classList.remove('sg-disabled');
  $('sg-ov'+i).style.cssText = '';
  const ic = $('sg-icon'+i);
  ic.style.display = 'none';
  ic.textContent = '';
}
function resetCards(){ cardReset(0); cardReset(1); }
function lockCards()  { $('sg-card0').classList.add('sg-disabled'); $('sg-card1').classList.add('sg-disabled'); }
function unlockCards(){ $('sg-card0').classList.remove('sg-disabled'); $('sg-card1').classList.remove('sg-disabled'); }

function cardCorrect(i){
  $('sg-card'+i).style.border = '2.5px solid #5BAD7A';
  $('sg-ov'+i).style.cssText  = 'position:absolute;inset:0;background:rgba(91,173,122,0.22);z-index:2;pointer-events:none;';
  const ic = $('sg-icon'+i);
  ic.style.cssText = 'display:flex;background:#5BAD7A;z-index:3;';
  ic.textContent = '✓';
}

function cardWrong(i){
  $('sg-card'+i).style.cssText = 'border:2.5px solid #D95B5B;background:white;animation:sg-shake .4s ease;';
  $('sg-ov'+i).style.cssText   = 'position:absolute;inset:0;background:rgba(217,91,91,0.22);z-index:2;pointer-events:none;';
  const ic = $('sg-icon'+i);
  ic.style.cssText = 'display:flex;background:#D95B5B;z-index:3;';
  ic.textContent = '✗';
}

/* ─── ПРОГРЕСС / СЧЁТ / ЭТАПЫ ─── */
function updateStageDots(){
  for(let i=0;i<3;i++){
    $('sg-dot-'+i).className = 'sg-dot' + (i<currentStage?' sg-done': i===currentStage?' sg-active':'');
  }
}
function updateProgress(){
  $('sg-progressBar').style.width = Math.round(abaStep/ABA_STEPS_CURRENT*100) + '%';
}
function updateScore(){
  $('sg-scoreCorrect').textContent = scoreCorrect;
  $('sg-scoreWrong').textContent   = scoreWrong;
}

/* ─── ОТВЛЕКАШКИ ─── */
// Колода отвлекашек — перемешиваем все и выдаём по очереди, не повторяясь
let distractorDeck = [];
function getNextDistractors(count){
  const result = [];
  for(let i=0; i<count; i++){
    if(distractorDeck.length === 0){
      distractorDeck = shuffle(DISTRACTORS.map((_,i)=>i));
    }
    result.push(distractorDeck.shift());
  }
  return result;
}

function runDistractors(count, onDone){
  if(count===0){ onDone(); return; }
  const pool = getNextDistractors(count);
  let i = 0;
  function next(){ i >= pool.length ? onDone() : showDistractor(pool[i++], next); }
  next();
}

let currentDistractorAudio = null; // для кнопки повторить

function showDistractor(dIdx, onDone){
  phase = 'distr';
  currentDistractorAudio = null;
  $('sg-cards').style.display     = 'none';
  $('sg-distrWrap').style.display = 'flex';

  const d = DISTRACTORS[dIdx];
  $('sg-questionText').textContent = d.label;
  $('sg-streakHint').textContent   = '';
  $('sg-distrOv').style.cssText    = '';
  $('sg-distrIcon').style.cssText  = 'display:none;';
  $('sg-distrIcon').textContent    = '';
  $('sg-distrCard').style.cssText  = '';
  $('sg-distrCard').classList.remove('sg-disabled');
  $('sg-distrImg').style.animation = '';

  function closeDistr(){
    $('sg-distrWrap').style.display = 'none';
    $('sg-cards').style.display     = 'flex';
    $('sg-streakHint').textContent  = '';
    $('sg-distrImg').removeAttribute('style');
    $('sg-distrImg').src = '';
    onDone();
  }

  // ── tap_wiggle: картинка подёргивается, ждём клика ──
  if(d.type === 'tap_wiggle'){
    $('sg-distrImg').src = DBASE + d.name + '.png';
    $('sg-distrImg').style.animation = 'sg-wiggle 0.6s ease-in-out infinite';
    currentDistractorAudio = d.name;
    playItemAudio(d.name, null);

    function handler(){
      $('sg-distrCard').removeEventListener('click', handler);
      $('sg-distrCard').classList.add('sg-disabled');
      $('sg-distrImg').style.animation = '';
      if(currentAudio){ currentAudio.pause(); currentAudio=null; }
      playDistractorCorrect();
      setTimeout(closeDistr, 400);
    }
    $('sg-distrCard').addEventListener('click', handler);
  }

  // ── sound_auto: звук сразу, нажать можно сразу ──
  if(d.type === 'sound_auto'){
    $('sg-distrImg').src = DBASE + (d.imgName||d.name) + '.png';
    currentDistractorAudio = d.name;
    playItemAudio(d.name, null);

    function handler(){
      $('sg-distrCard').removeEventListener('click', handler);
      $('sg-distrCard').classList.add('sg-disabled');
      if(currentAudio){ currentAudio.pause(); currentAudio=null; }
      playDistractorCorrect();
      setTimeout(closeDistr, 400);
    }
    $('sg-distrCard').addEventListener('click', handler);
  }

  // ── puzzle: перетащить левую половину к правой ──
  if(d.type === 'puzzle'){
    $('sg-distrCard').classList.add('sg-puzzle');
    $('sg-questionText').textContent = 'Соедини:';

    const imgL = DBASE + d.name + 'l.' + d.leftExt;
    const imgR = DBASE + d.name + 'r.' + d.rightExt;
    const card  = $('sg-distrCard');

    // Правая картинка — добавляем отдельно
    let imgRight = document.getElementById('sg-puzzleRight');
    if(!imgRight){
      imgRight = document.createElement('img');
      imgRight.id = 'sg-puzzleRight';
      card.appendChild(imgRight);
    }
    imgRight.src = imgR;
    imgRight.style.cssText = 'height:200px;width:auto;position:absolute;left:50%;top:50%;transform:translateY(-50%);pointer-events:none;display:block;';

    // Левая картинка — через стандартный distrImg
    const iL = $('sg-distrImg');
    iL.src = imgL;
    iL.style.cssText = 'height:200px;width:auto;position:absolute;left:0;top:50%;transform:translateY(-50%);cursor:grab;display:block;pointer-events:auto;';

    let snapLeft = 0;
    let isDrag = false, dragX = 0, startL = 0;
    let puzzleDone = false;
    let animId = null;

    function initSnap(){
      const cardW = card.offsetWidth;
      const leftW = iL.offsetWidth;
      snapLeft = cardW/2 - leftW;
      startAnim();
    }

    function eio(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
    function eiq(t){ return t*t; }

    function startAnim(){
      if(animId) cancelAnimationFrame(animId);
      const hintMax = snapLeft - 60;
      const travel  = hintMax - 0;
      let p=0, going=true, pause=0;
      function step(ts){
        if(isDrag||puzzleDone) return;
        if(pause&&ts<pause){ animId=requestAnimationFrame(step); return; }
        pause=0;
        if(going){ p+=0.008; if(p>=1){ p=1; going=false; pause=ts+500; } }
        else      { p-=0.04;  if(p<=0){ p=0; going=true; } }
        iL.style.left = (going||p>0 ? eio(p) : eiq(p)) * travel + 'px';
        animId = requestAnimationFrame(step);
      }
      animId = requestAnimationFrame(step);
    }

    function stopAnim(){ if(animId){ cancelAnimationFrame(animId); animId=null; } }

    function snapAndClose(){
      iL.style.left = snapLeft + 'px';
      puzzleDone = true;
      stopAnim();
      document.removeEventListener('touchmove', tmv);
      document.removeEventListener('touchend',  tup);
      document.removeEventListener('mousemove', mmv);
      document.removeEventListener('mouseup',   mup);
      if(currentAudio){ currentAudio.pause(); currentAudio = null; }
      playDistractorCorrect();
      setTimeout(()=>{
        const pz = document.getElementById('sg-puzzleRight');
        if(pz) pz.remove();
        iL.removeAttribute('style');
        $('sg-distrCard').classList.remove('sg-puzzle');
        closeDistr();
      }, 500);
    }

    function doMove(x){
      if(!isDrag) return;
      const nl = Math.max(0, Math.min(snapLeft, startL + (x - dragX)));
      iL.style.left = nl + 'px';
    }

    function doUp(){
      if(!isDrag) return;
      isDrag = false; iL.style.cursor = 'grab';
      const cur = parseFloat(iL.style.left)||0;
      if(snapLeft > 0 && cur >= snapLeft - 5){
        snapAndClose();
      } else {
        iL.style.transition = 'left 0.3s';
        iL.style.left = '0px';
        setTimeout(()=>{ iL.style.transition=''; startAnim(); }, 320);
      }
    }

    iL.addEventListener('touchstart', e=>{
      e.stopPropagation(); e.preventDefault();
      if(puzzleDone) return;
      stopAnim(); isDrag=true; dragX=e.touches[0].clientX;
      startL=parseFloat(iL.style.left)||0; iL.style.cursor='grabbing';
    }, {passive:false});

    const tmv = e=>{ if(!isDrag) return; e.preventDefault(); doMove(e.touches[0].clientX); };
    const tup = ()=>doUp();
    document.addEventListener('touchmove', tmv, {passive:false});
    document.addEventListener('touchend',  tup);

    iL.addEventListener('mousedown', e=>{
      if(puzzleDone) return;
      stopAnim(); isDrag=true; dragX=e.clientX;
      startL=parseFloat(iL.style.left)||0; iL.style.cursor='grabbing';
    });
    const mmv = e=>{ if(!isDrag) return; doMove(e.clientX); };
    const mup = ()=>doUp();
    document.addEventListener('mousemove', mmv);
    document.addEventListener('mouseup',   mup);

    iL.onload = ()=>{ requestAnimationFrame(()=>requestAnimationFrame(initSnap)); };
    if(iL.complete && iL.naturalWidth) requestAnimationFrame(()=>requestAnimationFrame(initSnap));
  }
}

/* ─── ПОДСКАЗКА ─── */
function showHint(onDone){
  phase    = 'hint';
  answered = false;
  $('sg-cards').style.display    = 'flex';
  $('sg-distrWrap').style.display = 'none';
  $('sg-streakHint').textContent  = '';

  targetSize = pickTarget();
  hintPair   = pickPair();
  correctPos = Math.random()<.5 ? 0 : 1;

  setImgs(hintPair, targetSize, correctPos);
  lockCards();

  $('sg-questionText').textContent = '💡 Смотри: это ' + (targetSize==='big' ? 'большой!' : 'маленький!');

  setTimeout(()=>{
    cardCorrect(correctPos);
    playAudio(hintFile(targetSize), ()=>{
      setTimeout(()=>{
        resetCards();
        $('sg-questionText').textContent = targetSize==='big' ? 'Выбери большой предмет:' : 'Выбери маленький предмет:';
        if(onDone) onDone();
      }, 800);
    });
  }, 500);
}

/* ─── ВОПРОС ─── */
function showQuestion(useHintPair){
  phase    = 'q';
  answered = false;
  $('sg-cards').style.display    = 'flex';
  $('sg-distrWrap').style.display = 'none';
  $('sg-streakHint').textContent  = '';
  updateProgress();

  if(currentStage === 2){
    // Этап 3: берём из сбалансированной очереди
    targetSize = stage3Queue[abaStep] || 'big';
    hintPair   = pickPair();
    correctPos = Math.random()<.5 ? 0 : 1;
  } else if(!useHintPair){
    targetSize = pickTarget();
    hintPair   = pickPair();
    correctPos = Math.random()<.5 ? 0 : 1;
  }

  setImgs(hintPair, targetSize, correctPos);
  $('sg-questionText').textContent = targetSize==='big' ? 'Выбери большой предмет:' : 'Выбери маленький предмет:';
  unlockCards();

  playAudio(qFile(targetSize));
}

/* ─── ОТВЕТ ─── */
function onAnswer(pos){
  if(answered || phase!=='q') return;
  answered = true;
  lockCards();

  if(pos === correctPos){
    cardCorrect(pos);
    playCorrect();
    scoreCorrect++;
    updateScore();

    playAudio(hintFile(targetSize), ()=>{
      playAudio(randPraise(), ()=>{
        resetCards();
        abaStep++;
        updateProgress();

        if(abaStep >= ABA_STEPS_CURRENT){
          setTimeout(showStageComplete, 400);
        } else {
          if(currentStage === 2){
            showQuestion(false);
          } else {
            runDistractors(abaStep, ()=> showQuestion(false));
          }
        }
      });
    });

  } else {
    cardWrong(pos);
    playWrong();
    scoreWrong++;
    updateScore();

    setTimeout(()=>{
      resetCards();
      abaStep = 0;
      updateProgress();

      if(currentStage === 2){
        currentStage = 0;
        ABA_STEPS_CURRENT = 4;
        usedPairs.clear();
        stage3Queue = [];
        updateStageDots();
        showHint(()=> showQuestion(true));
      } else {
        showHint(()=> showQuestion(true));
      }
    }, 900);
  }
}

/* ─── ЗАВЕРШЕНИЕ ЭТАПА ─── */
function showStageComplete(){
  const isLast = currentStage === 2;
  isLast ? playFanfare() : playStageComplete();
  launchFireworks();

  $('sg-overlayEmoji').textContent = isLast ? '🏆' : '⭐';
  $('sg-overlayTitle').textContent = isLast ? 'Ты справился!' : 'Отлично!';
  $('sg-overlaySub').textContent   = isLast ? 'Все этапы пройдены!' : 'Этап '+(currentStage+1)+' пройден!';
  $('sg-overlayBtn').textContent   = isLast ? '🔄 Пройти заново' : 'Дальше →';
  $('sg-overlayBtn').onclick       = isLast ? restartAll : nextStage;

  if(isLast) for(let i=0;i<3;i++) $('sg-dot-'+i).className = 'sg-dot sg-done';
  $('sg-overlay').classList.add('sg-show');
}

function nextStage(){
  $('sg-overlay').classList.remove('sg-show');
  stopFireworks();
  currentStage++; abaStep=0; hintPair=null;
  usedPairs.clear();
  updateStageDots(); updateProgress();

  if(currentStage === 2){
    // Этап 3: Random Rotation — 8 вопросов, без подсказки, без отвлекашек
    ABA_STEPS_CURRENT = 8;
    stage3Queue = shuffle(['big','big','big','big','small','small','small','small']);
    showQuestion(false);
  } else {
    ABA_STEPS_CURRENT = 4;
    showHint(()=> showQuestion(true));
  }
}

function restartAll(){
  $('sg-overlay').classList.remove('sg-show');
  stopFireworks();
  currentStage=0; abaStep=0; scoreCorrect=0; scoreWrong=0; hintPair=null;
  ABA_STEPS_CURRENT=4; stage3Queue=[];
  usedPairs.clear();
  updateStageDots(); updateScore(); updateProgress();
  showHint(()=> showQuestion(true));
}

/* ─── FIREWORKS ─── */
const canvas = $('sg-fireworks'), c2d = canvas.getContext('2d');
let fwP=[], fwRun=false, fwRaf=null;

function launchFireworks(){
  const box = $('sofia-game');
  canvas.width=box.offsetWidth; canvas.height=box.offsetHeight;
  fwP=[]; fwRun=true; spawnBurst(); spawnBurst(); fwLoop();
  setTimeout(()=>fwRun=false, 3000);
}
function stopFireworks(){ fwRun=false; cancelAnimationFrame(fwRaf); c2d.clearRect(0,0,canvas.width,canvas.height); }
function spawnBurst(){
  const x=.2+Math.random()*.6, y=.1+Math.random()*.5;
  const cols=['#7DC06A','#F5871F','#ffcc00','#ff6b6b','#74c0fc','#f8c8ff'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    fwP.push({x:canvas.width*x, y:canvas.height*y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, alpha:1, color:col, r:2+Math.random()*3});
  }
}
function fwLoop(){
  c2d.clearRect(0,0,canvas.width,canvas.height);
  fwP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.alpha-=.018;c2d.globalAlpha=Math.max(0,p.alpha);c2d.beginPath();c2d.arc(p.x,p.y,p.r,0,Math.PI*2);c2d.fillStyle=p.color;c2d.fill();});
  c2d.globalAlpha=1;
  fwP=fwP.filter(p=>p.alpha>0);
  if(fwRun&&fwP.length<100) spawnBurst();
  if(fwP.length>0||fwRun) fwRaf=requestAnimationFrame(fwLoop);
  else c2d.clearRect(0,0,canvas.width,canvas.height);
}

/* ─── СОБЫТИЯ ─── */
$('sg-card0').addEventListener('click', ()=> onAnswer(0));
$('sg-card1').addEventListener('click', ()=> onAnswer(1));

$('sg-repeatBtn').addEventListener('click', ()=>{
  if(phase==='q')    playAudio(qFile(targetSize));
  if(phase==='hint') playAudio(hintFile(targetSize));
  if(phase==='distr' && currentDistractorAudio) playItemAudio(currentDistractorAudio);
});

$('sg-soundBtn').addEventListener('click', ()=>{
  soundOn = !soundOn;
  $('sg-soundBtn').classList.toggle('sg-muted', !soundOn);
  $('sg-soundIcon').innerHTML = soundOn
    ? '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>'
    : '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  if(!soundOn && currentAudio){ currentAudio.pause(); currentAudio=null; }
});

$('sg-start-btn').addEventListener('click', ()=>{
  $('sg-start-overlay').style.display = 'none';
  currentStage=0; abaStep=0; scoreCorrect=0; scoreWrong=0; hintPair=null;
  ABA_STEPS_CURRENT=4; stage3Queue=[];
  usedPairs.clear();
  updateStageDots(); updateScore(); updateProgress();
  showHint(()=> showQuestion(true));
});

})();
